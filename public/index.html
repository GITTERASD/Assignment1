<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0f1020" />
    <title>BeatLab · Strudel</title>
    <meta name="description" content="A sleek React front-end and preprocessor UI for Strudel.cc live-coding." />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg: #0b0f0c; /* black background */
            --card: #0f1312; /* dark card */
            --ink: #e8f5e9; 
            --ink-dim: #9ad1b2; 
            --accent: #00e676; 
            --accent-2: #1de9b6; 
            --border: rgba(255,255,255,.06);
        }

        html, body {
            height: 100%
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
        }

        .bg-surface {
            min-height: 100vh
        }

        .container {
            max-width: 1200px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px
        }

        .card-header {
            background: linear-gradient(90deg,var(--accent),var(--accent-2));
            color: #000;
            font-weight: 700
        }

        .btn {
            border-radius: 12px
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent)
        }

        .btn-outline-secondary {
            color: var(--ink);
            border-color: var(--border)
        }

        a, .link {
            color: var(--accent)
        }

        header img {
            height: 36px;
            vertical-align: middle
        }
   
            header img:not([src]), header img[src=""], header img[onerror] {
                display: none
            }
    </style>

 

    <meta property="og:title" content="BeatLab  Strudel" />
    <meta property="og:description" content="A sleek React front-end and preprocessor UI for Strudel.cc live-coding." />
    <meta property="og:image" content="%PUBLIC_URL%/ui/og-image.png" />
    <meta property="og:type" content="website" />
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
