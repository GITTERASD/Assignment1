<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0f1020" />
    <title>BeatLab · Strudel</title>
    <meta name="description" content="A sleek React front-end and preprocessor UI for Strudel.cc live-coding." />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <!-- Simple theming hook -->
    <style>
        :root {
            --bg: #0f1020;
            --card: #17182d;
            --ink: #e9ecff;
            --ink-dim: #a6add3;
            --accent: #6366f1;
            --accent-2: #22d3ee;
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
            background: var(--bg);
            color: var(--ink);
        }

        .bg-surface {
            background-image: url('/ui/hero-bg.svg');
            background-size: cover;
            background-attachment: fixed;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
        }

        .bg-gradient-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        .text-white {
            color: #fff !important;
        }

        .rounded-4 {
            border-radius: 1rem;
        }

        header img {
            filter: drop-shadow(0 6px 12px rgba(0,0,0,.35));
        }

        code, pre, textarea {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .container {
            max-width: 1200px;
        }
    </style>

    <!-- OpenGraph (optional) -->
    <meta property="og:title" content="BeatLab · Strudel" />
    <meta property="og:description" content="A sleek React front-end and preprocessor UI for Strudel.cc live-coding." />
    <meta property="og:image" content="%PUBLIC_URL%/ui/og-image.png" />
    <meta property="og:type" content="website" />
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
